<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet">
<title>Para Ti bb ❤️</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->

<div id="loginPage">

<div class="collage">
    <img src="assets/images/foto1.jpg">
    <img src="assets/images/foto2.jpg">
    <img src="assets/images/foto3.jpg">
    <img src="assets/images/foto4.jpg">
    <img src="assets/images/foto5.jpg">
    <img src="assets/images/foto6.jpg">
    <img src="assets/images/foto7.jpg">
    <img src="assets/images/foto8.jpeg">
</div>

<div class="overlay"></div>

<div class="login-box">

<h2>🌷</h2>

<p>
Oda mi niña, coloca la fecha donde nos conocimos por primera vez:
</p>

<input type="date" id="fecha">

<button onclick="validarFecha()">
Entrar ❤️
</button>

<p id="error"></p>

</div>

</div>

<!-- PAGINA PRINCIPAL -->

<div id="mainPage">

<div class="tree-container">

<div id="trunk"></div>

<div id="hearts"></div>

</div>

<div id="mensaje"></div>

<div id="countdown-container">

<h4>
Contando los segundos para poder abrazarte de nuevo mi tulipan:
</h4>

<div id="countdown"></div>

<audio id="musica" loop>
    <source src="assets/audio/musica.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
